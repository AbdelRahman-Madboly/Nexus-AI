version: "3.9"

services:

  nexus-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nexus-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://172.29.208.1:11434
      - CHROMA_HOST=nexus-chroma
      - CHROMA_PORT=8000
      - OPENCLAW_NEXUS_API_URL=http://nexus-api:8000
      - DATABASE_URL=sqlite:///./nexus.db
      # Force HuggingFace to use local model cache — no DNS lookups to huggingface.co.
      # Required because WSL2 DNS cannot reach huggingface.co from inside Docker.
      # CrossEncoder (cross-encoder/ms-marco-MiniLM-L-6-v2) is already cached at
      # ~/.cache/huggingface/hub/ and is bind-mounted below.
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
    volumes:
      - ./nexus.db:/app/nexus.db
      # Bind-mount the host HuggingFace cache into the container so the
      # CrossEncoder model is available without a network download.
      - ~/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      - nexus-chroma
      - nexus-ollama
    restart: unless-stopped
    networks:
      - nexus-network

  nexus-chroma:
    image: chromadb/chroma:0.6.3
    container_name: nexus-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - nexus-network

  nexus-ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough disabled — requires NVIDIA Container Toolkit in WSL.
    # nexus-api uses your Windows Ollama (RTX 4050) via OLLAMA_BASE_URL in .env.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    networks:
      - nexus-network

  nexus-n8n:
    image: n8nio/n8n:latest
    container_name: nexus-n8n
    ports:
      - "5678:5678"
    env_file: .env
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    restart: unless-stopped
    networks:
      - nexus-network

  nexus-ui:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nexus-ui
    ports:
      - "3000:3000"
    environment:
      # The dashboard talks to the FastAPI via the Vite proxy in dev.
      # In production (this Docker build), the React bundle is static and
      # served by `serve`. All /api calls go to nexus-api via the browser,
      # so VITE_API_BASE is not needed — the proxy is baked out at build time.
      # If you ever need SSR or server-side env vars, add them here.
      - NODE_ENV=production
    depends_on:
      - nexus-api
    restart: unless-stopped
    networks:
      - nexus-network

  nexus-openclaw:
    image: node:22-alpine
    container_name: nexus-openclaw
    working_dir: /app
    command: sh -c "echo 'Nexus OpenClaw placeholder' && tail -f /dev/null"
    ports:
      - "3456:3456"
    depends_on:
      - nexus-api
      - nexus-ollama
    restart: unless-stopped
    networks:
      - nexus-network

volumes:
  chroma_data:
  ollama_data:
  n8n_data:

networks:
  nexus-network:
    driver: bridge
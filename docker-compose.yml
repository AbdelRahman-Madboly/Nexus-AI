version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────
  nexus-api:
    build: ./api
    container_name: nexus-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./api:/app
      - ./nexus.db:/app/nexus.db
    depends_on:
      - nexus-chroma
      - nexus-ollama
    restart: unless-stopped

  # ── ChromaDB Vector Store ────────────────────────────────────────
  nexus-chroma:
    image: chromadb/chroma:latest
    container_name: nexus-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ── Ollama Local LLM ─────────────────────────────────────────────
  nexus-ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ── n8n Automation ───────────────────────────────────────────────
  nexus-n8n:
    image: n8nio/n8n:latest
    container_name: nexus-n8n
    ports:
      - "5678:5678"
    env_file: .env
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    restart: unless-stopped

  # ── React Dashboard ──────────────────────────────────────────────
  nexus-ui:
    build: ./dashboard
    container_name: nexus-ui
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - nexus-api
    restart: unless-stopped

  # ── OpenClaw Gateway ─────────────────────────────────────────────
  # Messaging AI agent: Telegram / WhatsApp / Slack
  nexus-openclaw:
    image: node:24-alpine
    container_name: nexus-openclaw
    working_dir: /app
    command: sh -c "npm install -g openclaw && openclaw start"
    ports:
      - "3456:3456"
    env_file: openclaw/.env
    volumes:
      - ./openclaw:/app/openclaw-config
      - openclaw_data:/root/.openclaw
    depends_on:
      - nexus-api
      - nexus-ollama
    restart: unless-stopped

volumes:
  chroma_data:
  ollama_data:
  n8n_data:
  openclaw_data:
